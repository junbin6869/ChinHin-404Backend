name: Build and deploy Python app to Azure Web App - 404

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build app with App Service build action
        uses: azure/appservice-build@v2
        with:
          platform: python
          platform-version: "3.11"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "404"
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BD038AFC9F124793B8CC2C2F26ED597C }}
          package: .